name: Release

# Tag a commit with v* (for example v0.1.0) to build the APK and publish a
# GitHub Release with the APK attached for direct download.

# Opt the JS-based actions onto Node 24 now (forced by default after 2026-06-16).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK with tag
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/sshot-classifier-${GITHUB_REF_NAME}.apk"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          body: |
            Debug-signed APK for sideloading. Enable "install unknown apps" on the
            device to install. This is not a Play Store signed release.
