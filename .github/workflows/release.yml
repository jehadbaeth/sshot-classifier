name: Release

# Tag a commit with v* (for example v0.1.0) to build the release artifacts:
#   - a signed APK attached to the GitHub Release for direct sideloading
#   - an AAB uploaded as a workflow artifact, for upload to Google Play
#
# Signing: set these repository secrets to produce upload-signed artifacts.
#   RELEASE_KEYSTORE_BASE64  base64 of the upload keystore (base64 -w0 upload.jks)
#   RELEASE_STORE_PASSWORD   keystore password
#   RELEASE_KEY_ALIAS        key alias
#   RELEASE_KEY_PASSWORD     key password
# Without them the build still succeeds but falls back to DEBUG signing: the APK
# is sideloadable, the AAB is NOT uploadable to Play (the job warns when this happens).

# Opt the JS-based actions onto Node 24 now (forced by default after 2026-06-16).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so we can build a real changelog

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.jks"
            echo "RELEASE_STORE_FILE=$RUNNER_TEMP/upload.jks" >> "$GITHUB_ENV"
            echo "Keystore decoded: release artifacts will be upload-signed."
          else
            echo "::warning::No RELEASE_KEYSTORE_BASE64 secret. Artifacts will be DEBUG-signed; the AAB is NOT uploadable to Play."
          fi

      - name: Build release APK and AAB
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/sshot-classifier-${GITHUB_REF_NAME}.apk"
          cp app/build/outputs/bundle/release/app-release.aab "dist/sshot-classifier-${GITHUB_REF_NAME}.aab"

      - name: Generate release notes from commits
        run: |
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then RANGE="$PREV..${GITHUB_REF_NAME}"; else RANGE="${GITHUB_REF_NAME}"; fi
          {
            echo "## What's changed in ${GITHUB_REF_NAME}"
            echo ""
            # One bullet per commit subject, excluding version-bump noise.
            git log --no-merges --pretty='- %s' "$RANGE" | grep -v -i '^- Bump version' || echo "- (no notable changes)"
            echo ""
            if [ -n "$PREV" ]; then
              echo "**Full changelog:** \`$PREV...${GITHUB_REF_NAME}\`"
              echo ""
            fi
            echo "---"
            echo "Signed APK for sideloading — enable \"install unknown apps\" on the device to install."
            echo "The Play Store AAB is built in the same run and attached as a workflow artifact"
            echo "(not directly installable; it is the upload input for Google Play)."
          } > dist/NOTES.md
          echo "----- generated notes -----"; cat dist/NOTES.md

      - name: Upload AAB as workflow artifact (Play upload input, not installable)
        uses: actions/upload-artifact@v4
        with:
          name: sshot-classifier-${{ github.ref_name }}-aab
          path: dist/*.aab
          retention-days: 90

      - name: Publish release with sideload APK
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          body_path: dist/NOTES.md
